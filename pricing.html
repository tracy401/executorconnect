<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing — ExecutorConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script async src="https://js.stripe.com/v3/pricing-table.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0f2240; --navy-mid: #1a3660; --gold: #FC690B; --gold-light: #fd8033;
      --cream: #faf7f2; --cream-dark: #f0ebe0; --text: #1a1a1a; --text-muted: #5a5a5a;
      --white: #ffffff; --border: rgba(252,105,11,0.25);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); line-height: 1.6; }

    /* Nav */
    nav { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 3rem; background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 600; color: var(--navy); letter-spacing: -0.01em; text-decoration: none; }
    .logo span { color: var(--gold); }
    nav a { font-size: 0.875rem; color: var(--text-muted); text-decoration: none; font-weight: 400; }
    .nav-cta { background: var(--navy); color: var(--white) !important; padding: 0.5rem 1.25rem; border-radius: 4px; font-weight: 500 !important; font-size: 0.875rem !important; transition: background 0.2s; }
    .nav-cta:hover { background: var(--navy-mid); }
    .nav-links { display: flex; gap: 2rem; align-items: center; }

    /* Page header */
    .page-header { background: var(--navy); padding: 3.5rem 3rem; text-align: center; }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 3vw, 2.6rem); font-weight: 600; color: var(--white); letter-spacing: -0.02em; margin-bottom: 0.75rem; }
    .page-header p { color: rgba(255,255,255,0.65); font-size: 1rem; font-weight: 300; max-width: 520px; margin: 0 auto; line-height: 1.7; }

    /* Stripe table wrapper */
    .stripe-wrapper { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem 5rem; }

    /* Footer */
    footer { background: var(--navy); border-top: 1px solid rgba(255,255,255,0.08); padding: 2rem 3rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    footer .logo { color: rgba(255,255,255,0.5); font-size: 1rem; }
    footer .logo span { color: rgba(252,105,11,0.6); }
    footer p { font-size: 0.8rem; color: rgba(255,255,255,0.3); }

    @media (max-width: 600px) {
      nav { padding: 1rem 1.25rem; } .nav-links { gap: 1rem; }
      .page-header { padding: 2.5rem 1.25rem; }
      .stripe-wrapper { padding: 2rem 1rem 3rem; }
      footer { padding: 1.5rem 1.25rem; }
    }
  </style>
</head>
